<!DOCTYPE html>
<html lang="es-Co">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller 3</title>
    <link rel="icon" type="image/x-icon" href="../assets/img/logo_sena.png">
    <!-- seo tags -->
    <meta name="author" content="Angie Rodriguez">
    <meta name="description" content="taller 1 de maquetacion web">
    <meta name="keywords" content="TALLER,taller,Taller">
    <!--OPTIMIZATION TAGS  meta [name="" content=""]*5-->
    <meta name="theme-color" content="#000000">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-traslucent">

    <!--BOOSTRAP CSS cdn-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons cdn -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--BOOSTRAP CSS LOCAL 
    <link rel="stylesheet" href="taller3/assets/css/bootstrap.css">
    -->
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <header class="sticky-top">
        <nav class="navbar navbar-expand-sm navbar-dark sticky-top ">
            <div class="container-fluid">
                <a class="navbar-brand" href="">Arte</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                
            </div>
        </nav>
    </header>
    <main>
        <div class="container my-5">
            <div class="row g-4">

                <!-- Registro -->
                <div class="col-md-6">
                    <div class="card border-0 shadow-lg rounded-4 bg-light">
                        <div class="card-body p-5">
                            <h2 class="text-center text-danger mb-4">
                                <i class="bi bi-person-plus-fill"></i> Registro
                            </h2>

                            <form>
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control mb-3">

                                <label class="form-label">Apellido</label>
                                <input type="text" class="form-control mb-3">

                                <label class="form-label">Correo</label>
                                <input type="email" class="form-control mb-3">

                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control mb-4">

                                <button class="btn btn-danger w-100 rounded-pill">
                                    Registrarse
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Inicio de sesión -->
                <div class="col-md-6">
                    <div class="card border-0 shadow-lg rounded-4 bg-info-subtle">
                        <div class="card-body p-5">
                            <h2 class="text-center text-primary mb-4">
                                <i class="bi bi-box-arrow-in-right"></i> Inicio de Sesión
                            </h2>

                            <form>
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control mb-3">

                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control mb-3">

                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox">
                                    <label class="form-check-label">
                                        Recordarme
                                    </label>
                                </div>

                                <a href="/index.html" class="btn btn-primary w-100 rounded-pill">
                                    Iniciar sesión
                                </a>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <!-- FOOTER -->
    <footer class="footer text-center p-2 text-white fixed-bottom">
        <p class="mb-1">© 2026 Galería de Arte</p>
        <i class="bi bi-instagram mx-2"></i>
        <i class="bi bi-facebook mx-2"></i>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoY9F1kC7xkG6j5rZl2j6Y5n0hZl5z5n0hZl5z5n0hZl5z5"
        crossorigin="anonymous"></script>

</body>

</html>
